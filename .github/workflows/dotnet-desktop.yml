name: Build SqlPhanos

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_VERSION: 10.0.x
  PROJECT_PATH: ./SqlPhanos/SqlPhanos.csproj
  ARTIFACT_PATH: ${{ github.workspace }}/artifacts/sqlphanos

jobs:
  build:
    name: Build
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: |
            **/packages.lock.json
            **/*.csproj
            **/*.props
            **/*.targets
            global.json

      - name: Restore dependencies
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output "${{ env.ARTIFACT_PATH }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SqlPhanos-Build
          path: ${{ env.ARTIFACT_PATH }}
          if-no-files-found: error
          retention-days: 7
